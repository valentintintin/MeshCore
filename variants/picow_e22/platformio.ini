[picow_e22]
extends = rp2040_base
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
build_flags = ${rp2040_base.build_flags}
  -I variants/picow_e22
  ;-D PICOW
  -D HW_SPI1_DEVICE
  -D P_LORA_DIO_1=11
  -D P_LORA_NSS=13
  -D P_LORA_RESET=10
  -D P_LORA_BUSY=7
  -D P_LORA_SCLK=14
  -D P_LORA_MISO=12
  -D P_LORA_MOSI=15
  -D SX126X_RXEN=6
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=130
  -D SX126X_RX_BOOSTED_GAIN=1
  -D LORA_TX_POWER=22
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
build_src_filter = ${rp2040_base.build_src_filter}
  +<PicoWBoard.cpp>
  +<../variants/picow_e22>
lib_deps = ${rp2040_base.lib_deps}

[env:PicoWe22_repeater]
extends = picow_e22
build_flags = ${picow_e22.build_flags}
  -D MAX_NEIGHBOURS=50
  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
  -D ENABLE_ADVERT_ON_BOOT=0
  -D USE_MESHTASTIC_BRIDGE
  -D MESHTASTIC_BRIDGE_SERIAL_PORT=Serial2
  -D MESHTASTIC_BRIDGE_MAX_NODEDB=100
  -D MT_DEBUGGING
build_src_filter = ${picow_e22.build_src_filter}
  +<../examples/simple_repeater>

